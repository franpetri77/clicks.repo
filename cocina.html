<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clicks Burger — Cocina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #212121;
      --surface3: #2a2a2a;
      --yellow:   #F5A300;
      --yellow2:  #FFD066;
      --red:      #d93025;
      --red2:     #ff4444;
      --green:    #1e8c45;
      --blue:     #4a9eff;
      --text:     #f0f0f0;
      --muted:    #888888;
      --border:   #2e2e2e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: #111;
      border-bottom: 2px solid var(--yellow);
      padding: 0 20px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 1.5rem; }
    .logo-text { font-family: 'Anton', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--yellow); }
    .logo-sub  { font-size: 0.68rem; color: #666; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 20px; }

    .stats { display: flex; gap: 0; }
    .stat  {
      text-align: center; font-size: 0.68rem; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
      padding: 0 20px;
    }
    .stat + .stat { border-left: 1px solid var(--border); }
    .stat-num { font-family: 'Anton', sans-serif; font-size: 1.5rem; display: block; color: var(--yellow); line-height: 1; }
    .stat-num.red { color: var(--red2); }

    .reloj { font-family: 'Anton', sans-serif; font-size: 1.5rem; color: var(--yellow); font-variant-numeric: tabular-nums; letter-spacing: 2px; border-left: 1px solid var(--border); padding-left: 20px; margin-left: 4px; }

    /* ── ALERTA DEMORADOS ── */
    .alerta-demorados {
      display: none;
      background: #2a0808;
      border-bottom: 2px solid var(--red2);
      padding: 8px 20px;
      flex-shrink: 0;
      align-items: center; gap: 10px;
      animation: pulseBg 1.5s ease-in-out infinite;
    }
    .alerta-demorados.visible { display: flex; }
    .alerta-icon { font-size: 1.2rem; }
    .alerta-text { font-family: 'Anton', sans-serif; font-size: 0.85rem; letter-spacing: 2px; color: var(--red2); }
    @keyframes pulseBg {
      0%, 100% { background: #2a0808; }
      50%       { background: #3d0a0a; }
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      flex-shrink: 0;
    }
    .tab {
      padding: 11px 22px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer;
      border-bottom: 3px solid transparent; color: var(--muted);
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--yellow); border-color: var(--yellow); }
    .badge     { display: inline-block; background: var(--red); color: #fff; font-size: 0.65rem; font-weight: 900; border-radius: 10px; padding: 1px 6px; margin-left: 6px; }
    .badge.verde { background: var(--green); }

    /* ── GRID ── */
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    .grid    {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
      align-items: stretch; /* todas las celdas del grid a la misma altura si la fila lo permite */
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: slideIn 0.22s ease;
      transition: border-color 0.3s;
      /* Altura uniforme: mín para cards vacías, máx para no explotar */
      min-height: 220px;
      max-height: 480px;
      display: flex;
      flex-direction: column;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card.listo       { border-color: #1e5c3a; }
    .card.entregado   { border-color: #2a2a2a; opacity: 0.55; }
    .card.urgente     { border-color: var(--red2); }
    .card.demorado    { border-color: var(--red2); animation: slideIn 0.22s ease, pulseRed 1.2s ease-in-out infinite; }
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 #ff444420; }
      50%       { box-shadow: 0 0 0 6px #ff444420; }
    }

    /* ── HEAD ── */
    .card-head {
      background: linear-gradient(180deg, #242424 0%, #1e1e1e 100%);
      padding: 11px 13px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .card-num {
      font-family: 'Anton', sans-serif;
      font-size: 1.65rem; color: var(--yellow); letter-spacing: 1px; line-height: 1;
    }

    .card-meta { flex: 1; min-width: 0; }
    .card-hora { font-size: 0.74rem; color: var(--muted); }

    /* Badge delivery/takeaway */
    .tipo-badge {
      font-family: 'Anton', sans-serif;
      font-size: 0.65rem; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 10px;
      display: inline-flex; align-items: center; gap: 3px;
      margin-top: 2px;
    }
    .tipo-badge.delivery  { background: #1a2a3a; color: var(--blue); border: 1px solid #2a4a6a; }
    .tipo-badge.takeaway  { background: #1a2a1a; color: #5ecf7a;    border: 1px solid #2a5a2a; }

    /* Zona derecha del head: timer + demora */
    .card-head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }

    .card-timer {
      font-family: 'Anton', sans-serif;
      font-size: 0.9rem; padding: 3px 10px;
      border-radius: 10px; background: var(--surface3);
      color: var(--text); font-variant-numeric: tabular-nums;
      letter-spacing: 1px; white-space: nowrap;
    }
    .card-timer.warn   { background: #2a2200; color: var(--yellow); }
    .card-timer.alert  { background: #2a0808; color: var(--red2); font-size: 0.95rem; }

    .card-listo-check {
      color: var(--green); font-size: 1.4rem; line-height: 1;
      font-weight: 900;
    }

    .card-demora {
      font-size: 0.7rem; color: var(--muted);
      white-space: nowrap;
    }
    .card-demora.demorado-label { color: var(--red2); font-weight: 900; letter-spacing: 0.5px; }

    /* ── BADGE DEMORADO dentro de la card ── */
    .demorado-strip {
      display: none;
      background: #2a0808;
      border-top: 1px solid #5a1010;
      border-bottom: 1px solid #5a1010;
      padding: 5px 12px;
      font-family: 'Anton', sans-serif;
      font-size: 0.75rem; letter-spacing: 2px;
      color: var(--red2);
      text-align: center;
    }
    .card.demorado .demorado-strip { display: block; }

    /* ── ITEMS ── */
    .card-items {
      padding: 10px 13px 6px;
      flex: 1;              /* ocupa el espacio sobrante entre head y footer */
      overflow-y: auto;     /* scroll si hay muchos ítems */
      min-height: 60px;     /* al menos visible */
    }
    /* Scrollbar sutil dentro de la card */
    .card-items::-webkit-scrollbar { width: 3px; }
    .card-items::-webkit-scrollbar-track { background: transparent; }
    .card-items::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

    .card-item-wrap {
      border-bottom: 1px solid rgba(255,255,255,0.055);
      padding: 1px 0;
    }
    .card-item-wrap:last-child { border-bottom: none; }

    .card-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0 8px;
    }

    .item-qty {
      background: var(--yellow); color: #111;
      font-family: 'Anton', sans-serif; font-size: 0.9rem;
      min-width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .item-icon { font-size: 1.1rem; flex-shrink: 0; }

    /* Bloque de info para burgers (layout 2 filas) */
    .item-burger-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 5px;
    }

    .item-nombre {
      font-family: 'Anton', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.5px;
      color: #ffffff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Nombre para ítems sin variante (bebidas, extras) */
    .item-nombre-plain {
      flex: 1; min-width: 0;
      font-weight: 700; font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Fila 2 de item burger: badge variante + precio */
    .item-burger-row2 {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }

    /* Badge de variante — color por tamaño */
    .item-var {
      font-family: 'Anton', sans-serif;
      font-size: 0.68rem; letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 6px;
      display: inline-flex; align-items: center; flex-shrink: 0;
      background: var(--surface3); color: var(--muted); border: 1px solid var(--border);
    }
    .item-var-simple { background: #0c1a10; color: #4aba6a; border: 1px solid #1e4228; }
    .item-var-doble  { background: #201400; color: #F5A300; border: 1px solid #4a3000; }
    .item-var-triple { background: #1a0404; color: #ff6464; border: 1px solid #4a1010; }

    /* Precio de línea */
    .item-precio {
      font-family: 'Anton', sans-serif;
      font-size: 0.78rem; color: #555; flex-shrink: 0;
    }

    /* Obs por item */
    .item-obs-cocina {
      font-size: 0.77rem; color: #e8b84a;
      background: #1a1200;
      border-left: 3px solid #c87d00;
      padding: 6px 10px 6px 11px;
      margin: 2px 0 7px;
      border-radius: 0 6px 6px 0;
      line-height: 1.45;
    }

    /* ── TOTAL DEL PEDIDO ── */
    .card-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 13px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.18);
      flex-shrink: 0; /* siempre visible, nunca comprimido */
    }
    .card-total-label {
      font-size: 0.63rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
    }
    .card-total-amount {
      font-family: 'Anton', sans-serif; font-size: 1.1rem; color: var(--yellow);
    }

    /* ── NOTA GENERAL ── */
    .card-nota {
      margin: 0 12px 10px;
      background: #1a1200;
      border: 1px solid #3a2800;
      border-left: 3px solid var(--yellow);
      border-radius: 0 6px 6px 0;
      padding: 7px 10px 7px 12px;
      font-size: 0.78rem; color: #e8b84a;
      line-height: 1.4;
      flex-shrink: 0; /* no se comprime */
    }
    .card-nota::before { content: "⚠ "; font-weight: 900; }

    /* ── ACTIONS ── */
    .card-actions {
      padding: 10px 12px; display: flex; gap: 8px;
      border-top: 1px solid var(--border);
      background: #161616;
      flex-shrink: 0; /* siempre visible, nunca comprimido */
    }
    .btn-action {
      flex: 1; padding: 12px;
      border: none; border-radius: 7px;
      font-family: 'Anton', sans-serif;
      font-size: 0.85rem; letter-spacing: 1px;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .btn-action:hover  { opacity: 0.85; }
    .btn-action:active { transform: scale(0.97); }
    .btn-iniciar   { background: var(--blue); color: #fff; }
    .btn-listo     { background: var(--green); color: #fff; }
    .btn-entregar  { background: #1a4a2a; color: #5ecf7a; border: 1px solid #2a6a3a; }
    .btn-entregar:hover  { background: #1e6a38 !important; color: #fff; border-color: #3a8a4a; }
    .btn-cancelar  { background: transparent; color: var(--red); border: 1px solid #3a1a1a; }
    .btn-cancelar:hover  { background: #1f0808 !important; border-color: var(--red); }
    .btn-reabrir   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-reabrir:hover   { background: var(--surface2) !important; color: var(--text); }

    /* ── EMPTY ── */
    .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty .icon { font-size: 3.5rem; display: block; margin-bottom: 12px; opacity: 0.35; }
    .empty h2 { font-family: 'Anton', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--text); margin-bottom: 6px; }
    .empty p  { font-size: 0.82rem; }

    @keyframes ring {
      0%   { box-shadow: 0 0 0 0 #F5A30066; }
      70%  { box-shadow: 0 0 0 14px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .card.nuevo { animation: slideIn 0.22s ease, ring 0.7s ease 0.22s 2; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🍳</span>
    <div>
      <div class="logo-text">CLICKS BURGER</div>
      <div class="logo-sub">Pantalla de Cocina</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="cnt-pend">0</span>
        Pendientes
      </div>
      <div class="stat">
        <span class="stat-num red" id="cnt-dem">0</span>
        Demorados
      </div>
      <div class="stat">
        <span class="stat-num" id="cnt-list">0</span>
        Listos hoy
      </div>
    </div>
    <div class="reloj" id="reloj">00:00:00</div>
    <form method="POST" action="/api/logout" style="margin-left:8px;">
      <button type="submit" title="Cerrar sesión" style="
        background: transparent;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        color: #888;
        font-family: 'Lato', sans-serif;
        font-size: 0.72rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 6px 12px;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      " onmouseover="this.style.borderColor='#F5A300';this.style.color='#F5A300'"
         onmouseout="this.style.borderColor='#3a3a3a';this.style.color='#888'">
        Salir
      </button>
    </form>
  </div>
</header>

<!-- Barra de alerta cuando hay demorados -->
<div class="alerta-demorados" id="alerta-demorados">
  <span class="alerta-icon">🚨</span>
  <span class="alerta-text" id="alerta-text">HAY PEDIDOS DEMORADOS</span>
</div>

<div class="tabs">
  <div class="tab active" id="tab-confirmados" onclick="setTab('confirmados')">
    Confirmados <span class="badge" id="badge-confirmados">0</span>
  </div>
  <div class="tab" id="tab-en-cocina" onclick="setTab('en_cocina')">
    En Cocina <span class="badge" id="badge-encocina">0</span>
  </div>
  <div class="tab" id="tab-listos" onclick="setTab('listos')">
    Listos <span class="badge verde" id="badge-listos">0</span>
  </div>
  <div class="tab" id="tab-entregados" onclick="setTab('entregados')">
    Entregados <span class="badge" style="background:#2a2a2a" id="badge-entregados">0</span>
  </div>
</div>

<div class="content">
  <div class="grid" id="grid"></div>
</div>

<script>
const channel  = new BroadcastChannel('clicks_burger');
let pedidos    = JSON.parse(localStorage.getItem('cb_cola') || '[]');
let tabActual  = 'confirmados';
let timers     = {};   // num -> timestamp inicio

// ── RECIBIR EN TIEMPO REAL ──
channel.onmessage = ({ data }) => {
  if (data.tipo === 'pedido_confirmado') {
    const idx = pedidos.findIndex(x => x.num === data.pedido.num);
    if (idx >= 0) pedidos[idx] = data.pedido;
    else pedidos.push(data.pedido);
    render(true, data.pedido.num);
    alertarNuevo(data.pedido.num);
  }
  if (data.tipo === 'pedido_entregado') {
    const idx = pedidos.findIndex(x => x.num === data.pedido.num);
    if (idx >= 0) pedidos[idx] = data.pedido;
    render();
  }
};

window.addEventListener('storage', e => {
  if (e.key === 'cb_cola') {
    pedidos = JSON.parse(e.newValue || '[]');
    render();
  }
});

function alertarNuevo(num) {
  if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
  let n = 0; const orig = document.title;
  const iv = setInterval(() => {
    document.title = n++ % 2 === 0 ? `🔔 PEDIDO #${String(num).padStart(3,'0')}` : '🍔 COCINA';
    if (n > 8) { clearInterval(iv); document.title = orig; }
  }, 500);
}

// ── TABS ──
function setTab(tab) {
  tabActual = tab;
  ['confirmados','en_cocina','listos','entregados'].forEach(t => {
    const id = t === 'en_cocina' ? 'tab-en-cocina' : `tab-${t}`;
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', t === tab);
  });
  render();
}

// ── ACCIONES ──

// Cocina inicia la preparación
function iniciarPreparacion(num) {
  const p = pedidos.find(x => x.num === num);
  if (p) {
    p.estado = 'en_cocina';
    p.hora_inicio_cocina = hora();
    timers[num] = Date.now();
  }
  guardar(); render();
  const pp = pedidos.find(x => x.num === num);
  if (pp) channel.postMessage({ tipo: 'pedido_confirmado', pedido: pp });
}

// Cocina marca como listo
function marcarListo(num) {
  const p = pedidos.find(x => x.num === num);
  if (p) { p.estado = 'listo'; p.hora_listo = hora(); }
  guardar(); render();
  const pp = pedidos.find(x => x.num === num);
  if (pp) channel.postMessage({ tipo: 'pedido_confirmado', pedido: pp });
}

// Entregar (desde cocina)
function marcarEntregado(num) {
  const p = pedidos.find(x => x.num === num);
  if (p) { p.estado = 'entregado'; p.hora_entregado = hora(); }
  guardar(); render();
  const pp = pedidos.find(x => x.num === num);
  if (pp) channel.postMessage({ tipo: 'pedido_entregado', pedido: pp });
}

function reabrir(num) {
  const p = pedidos.find(x => x.num === num);
  if (p) { p.estado = 'confirmado'; delete p.hora_listo; delete p.hora_inicio_cocina; delete p._inicio; }
  guardar(); render();
}

function quitar(num) {
  if (!confirm(`¿Quitar el pedido #${String(num).padStart(3,'0')} de la cocina?`)) return;
  pedidos = pedidos.filter(x => x.num !== num);
  guardar(); render();
}

function guardar() { localStorage.setItem('cb_cola', JSON.stringify(pedidos)); }
function hora()    { return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }); }

// ── HELPERS TIMING ──
function getSegs(p) {
  return Math.floor((Date.now() - (timers[p.num] || Date.now())) / 1000);
}

function timerStr(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function timerClass(secs, demoraMin) {
  const limit = (demoraMin || 15) * 60;
  if (secs >= limit)              return 'alert';
  if (secs >= limit * 0.75)       return 'warn';
  return '';
}

// ── HELPER: clase de variante ──
function varClass(variante) {
  if (!variante) return 'item-var';
  const v = variante.toLowerCase();
  if (v.includes('simple')) return 'item-var item-var-simple';
  if (v.includes('doble'))  return 'item-var item-var-doble';
  if (v.includes('triple')) return 'item-var item-var-triple';
  return 'item-var';
}

// ── HELPER: render de un item ──
function renderItem(it) {
  const lineTotal = (it.precio || 0) * (it.cantidad || 1);
  if (it.variante) {
    // Hamburguesa: layout de 2 filas
    return `
      <div class="card-item-wrap">
        <div class="card-item">
          <span class="item-qty">${it.cantidad}</span>
          <span class="item-icon">${it.icon}</span>
          <div class="item-burger-info">
            <span class="item-nombre">${it.nombre}</span>
            <div class="item-burger-row2">
              <span class="${varClass(it.variante)}">${it.variante}</span>
              ${lineTotal > 0 ? `<span class="item-precio">$${lineTotal.toLocaleString('es-AR')}</span>` : ''}
            </div>
          </div>
        </div>
        ${it.obs ? `<div class="item-obs-cocina">✏︎ ${it.obs}</div>` : ''}
      </div>`;
  } else {
    // Bebida / extra: layout plano
    return `
      <div class="card-item-wrap">
        <div class="card-item">
          <span class="item-qty">${it.cantidad}</span>
          <span class="item-icon">${it.icon}</span>
          <span class="item-nombre-plain">${it.nombre}</span>
          ${lineTotal > 0 ? `<span class="item-precio">$${lineTotal.toLocaleString('es-AR')}</span>` : ''}
        </div>
        ${it.obs ? `<div class="item-obs-cocina">✏︎ ${it.obs}</div>` : ''}
      </div>`;
  }
}

// ── HELPER: total del pedido ──
function calcTotal(p) {
  return (p.items || []).reduce((s, it) => s + (it.precio || 0) * (it.cantidad || 1), 0);
}

function isDemorado(secs, demoraMin) {
  return secs >= (demoraMin || 15) * 60;
}

// ── RENDER PRINCIPAL ──
function render(esNuevo = false, numNuevo = null) {
  // Compatibilidad: si hay pedidos 'pendiente' (estado viejo) los tratamos como en_cocina
  const confirmados = pedidos.filter(p => p.estado === 'confirmado');
  const enCocina    = pedidos.filter(p => p.estado === 'en_cocina' || p.estado === 'pendiente');
  const listos      = pedidos.filter(p => p.estado === 'listo');
  const entregados  = pedidos.filter(p => p.estado === 'entregado');

  let filtrados;
  if      (tabActual === 'confirmados') filtrados = confirmados;
  else if (tabActual === 'en_cocina')   filtrados = enCocina;
  else if (tabActual === 'listos')      filtrados = listos;
  else if (tabActual === 'entregados')  filtrados = entregados;
  else filtrados = confirmados;

  const demorados = enCocina.filter(p => isDemorado(getSegs(p), p.demora)).length;

  document.getElementById('cnt-pend').textContent  = confirmados.length + enCocina.length;
  document.getElementById('cnt-list').textContent  = listos.length;
  document.getElementById('cnt-dem').textContent   = demorados;
  document.getElementById('badge-confirmados').textContent = confirmados.length;
  document.getElementById('badge-encocina').textContent    = enCocina.length;
  document.getElementById('badge-listos').textContent      = listos.length;
  document.getElementById('badge-entregados').textContent  = entregados.length;

  const alertaEl = document.getElementById('alerta-demorados');
  if (demorados > 0 && tabActual === 'en_cocina') {
    alertaEl.classList.add('visible');
    document.getElementById('alerta-text').textContent =
      `🚨  ${demorados} PEDIDO${demorados > 1 ? 'S' : ''} DEMORADO${demorados > 1 ? 'S' : ''}`;
  } else {
    alertaEl.classList.remove('visible');
  }

  const grid = document.getElementById('grid');

  const emptyMsgs = {
    confirmados: { icon: '⏳', h: 'SIN PEDIDOS CONFIRMADOS', p: 'Los pedidos confirmados por el admin aparecerán aquí.' },
    en_cocina:   { icon: '✅', h: 'TODO AL DÍA', p: 'No hay pedidos en preparación.' },
    listos:      { icon: '🕐', h: 'SIN LISTOS', p: 'Los pedidos completados aparecen aquí.' },
    entregados:  { icon: '📦', h: 'SIN ENTREGADOS', p: 'Los pedidos entregados del día aparecerán aquí.' },
  };

  if (!filtrados.length) {
    const m = emptyMsgs[tabActual] || emptyMsgs.confirmados;
    grid.innerHTML = `<div class="empty"><span class="icon">${m.icon}</span><h2>${m.h}</h2><p>${m.p}</p></div>`;
    return;
  }

  grid.innerHTML = filtrados.map(p => {
    const secs     = getSegs(p);
    const tStr     = timerStr(secs);
    const tClass   = timerClass(secs, p.demora);
    const demorado = isDemorado(secs, p.demora);
    const demoMin  = p.demora || 15;

    let cardClass = '';
    if      (p.estado === 'listo')      cardClass = 'listo';
    else if (p.estado === 'entregado')  cardClass = 'entregado';
    else if (p.estado === 'en_cocina' || p.estado === 'pendiente')
      cardClass = demorado ? 'demorado urgente' : '';

    const isNew     = esNuevo && p.num === numNuevo;
    const tipo      = p.tipo || 'takeaway';
    const tipoBadge = tipo === 'delivery'
      ? `<span class="tipo-badge delivery">🏍 DELIVERY</span>`
      : `<span class="tipo-badge takeaway">🥡 TAKEAWAY</span>`;

    let demoraLabel = '';
    if (p.estado === 'en_cocina' || p.estado === 'pendiente') {
      demoraLabel = demorado
        ? `<span class="card-demora demorado-label">¡DEMORADO! +${Math.floor(secs/60 - demoMin)} min</span>`
        : `<span class="card-demora">Est. ${demoMin} min</span>`;
    }

    const timerHtml = (p.estado === 'en_cocina' || p.estado === 'pendiente')
      ? `<div class="card-timer ${tClass}" id="timer-${p.num}">${tStr}</div>`
      : (p.estado === 'listo' ? `<div class="card-listo-check">✓</div>` : '');

    let accionesBtns = '';
    if (p.estado === 'confirmado') {
      accionesBtns = `
        <button class="btn-action btn-iniciar" onclick="iniciarPreparacion(${p.num})">▶ INICIAR PREPARACIÓN</button>
        <button class="btn-action btn-cancelar" onclick="quitar(${p.num})">✕</button>`;
    } else if (p.estado === 'en_cocina' || p.estado === 'pendiente') {
      accionesBtns = `
        <button class="btn-action btn-listo" onclick="marcarListo(${p.num})">✓ LISTO</button>
        <button class="btn-action btn-cancelar" onclick="quitar(${p.num})">✕</button>`;
    } else if (p.estado === 'listo') {
      accionesBtns = `
        <button class="btn-action btn-entregar" onclick="marcarEntregado(${p.num})">📦 ENTREGAR</button>
        <button class="btn-action btn-reabrir" onclick="reabrir(${p.num})">↩ REABRIR</button>`;
    } else if (p.estado === 'entregado') {
      accionesBtns = `
        <button class="btn-action btn-reabrir" onclick="reabrir(${p.num})">↩ REABRIR</button>
        <button class="btn-action btn-cancelar" onclick="quitar(${p.num})">✕ QUITAR</button>`;
    }

    const horaStr = p.hora
      + (p.hora_inicio_cocina ? ` → ${p.hora_inicio_cocina}` : '')
      + (p.hora_listo ? ` → ${p.hora_listo}` : '')
      + (p.hora_entregado ? ` → ${p.hora_entregado}` : '');

    return `
      <div class="card ${cardClass} ${isNew ? 'nuevo' : ''}" id="card-${p.num}">
        <div class="card-head">
          <div class="card-num">#${String(p.num).padStart(3,'0')}</div>
          <div class="card-meta">
            <div class="card-hora">${horaStr}</div>
            ${tipoBadge}
          </div>
          <div class="card-head-right">
            ${timerHtml}
            ${demoraLabel}
          </div>
        </div>
        ${demorado && (p.estado === 'en_cocina' || p.estado === 'pendiente') ? `<div class="demorado-strip">⚠ PEDIDO DEMORADO</div>` : ''}
        <div class="card-items">
          ${p.items.map(it => renderItem(it)).join('')}
        </div>
        ${p.aclaracion ? `<div class="card-nota">${p.aclaracion}</div>` : ''}
        <div class="card-total">
          <span class="card-total-label">💰 Total</span>
          <span class="card-total-amount">$${calcTotal(p).toLocaleString('es-AR')}</span>
        </div>
        <div class="card-actions">${accionesBtns}</div>
      </div>`;
  }).join('');

  pedidos.filter(p => p.estado === 'en_cocina' || p.estado === 'pendiente').forEach(p => {
    if (timers[p.num] === undefined) timers[p.num] = Date.now();
  });
}

// ── TICK TIMERS (sin re-renderizar todo) ──
function tickTimers() {
  if (tabActual !== 'en_cocina') return;
  let demorados = 0;
  pedidos.filter(p => p.estado === 'en_cocina' || p.estado === 'pendiente').forEach(p => {
    const secs = getSegs(p), el = document.getElementById(`timer-${p.num}`);
    const card = document.getElementById(`card-${p.num}`);
    const dem  = isDemorado(secs, p.demora);
    if (dem) demorados++;
    if (el) { el.textContent = timerStr(secs); el.className = `card-timer ${timerClass(secs, p.demora)}`; }
    if (card) {
      card.className = `card ${dem ? 'demorado urgente' : ''}`.trim();
      const demoraEl = card.querySelector('.card-demora');
      const demoMin  = p.demora || 15;
      if (demoraEl) {
        demoraEl.className = `card-demora${dem ? ' demorado-label' : ''}`;
        demoraEl.textContent = dem ? `¡DEMORADO! +${Math.floor(secs/60 - demoMin)} min` : `Est. ${demoMin} min`;
      }
      const strip = card.querySelector('.demorado-strip');
      if (strip) strip.style.display = dem ? 'block' : 'none';
    }
  });
  document.getElementById('cnt-dem').textContent = demorados;
  const alertaEl = document.getElementById('alerta-demorados');
  if (demorados > 0) {
    alertaEl.classList.add('visible');
    document.getElementById('alerta-text').textContent = `🚨  ${demorados} PEDIDO${demorados > 1 ? 'S' : ''} DEMORADO${demorados > 1 ? 'S' : ''}`;
  } else alertaEl.classList.remove('visible');
}

// ── RELOJ ──
function tickReloj() {
  document.getElementById('reloj').textContent =
    new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

setInterval(tickReloj,  1000);
setInterval(tickTimers, 1000);
tickReloj();

pedidos.filter(p => p.estado === 'en_cocina' || p.estado === 'pendiente').forEach(p => {
  timers[p.num] = Date.now();
});

setTab('confirmados');
</script>
</body>
</html>
