<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clicks Burger — Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Menú — tema oscuro (alineado con el resto de la app) */
      --menu-bg:      #0f0f0f;
      --menu-surface: #1a1a1a;
      --menu-surface2:#242424;
      --menu-text:    #f0f0f0;
      --menu-muted:   #888888;

      /* Cards en modo oscuro */
      --card-bg:      #1e1e1e;
      --card-border:  #333333;
      --card-hover:   #2a2a2a;

      /* Ticket — tema oscuro */
      --ticket-bg:    #141414;
      --ticket-surf:  #1e1e1e;
      --ticket-surf2: #282828;
      --ticket-surf3: #323232;
      --ticket-text:  #f0f0f0;
      --ticket-muted: #888888;
      --ticket-border:#303030;

      /* Comunes */
      --yellow:  #F5A300;
      --yellow2: #FFD066;
      --red:     #d93025;
      --green:   #1e8c45;
    }

    body {
      font-family: 'Lato', sans-serif;
      height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--menu-bg);
    }

    /* ════════════════════════════════
       HEADER
    ════════════════════════════════ */
    header {
      background: #111;
      padding: 0 20px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 2px solid var(--yellow);
      z-index: 10;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 1.6rem; }
    .logo-text {
      font-family: 'Anton', sans-serif;
      font-size: 1.35rem; letter-spacing: 2px; color: var(--yellow); line-height: 1;
    }
    .logo-sub { font-size: 0.68rem; color: #666; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px; }

    .pedido-badge {
      background: var(--yellow); color: #111;
      font-family: 'Anton', sans-serif;
      font-size: 0.88rem; letter-spacing: 1.5px;
      padding: 6px 14px; border-radius: 6px;
    }

    /* ════════════════════════════════
       LAYOUT
    ════════════════════════════════ */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ════════════════════════════════
       MENÚ (OSCuro)
    ════════════════════════════════ */
    .menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: clip;
      padding: 20px 16px;
      background: var(--menu-bg);
      color: var(--menu-text);
      display: flex;
      flex-direction: column;
    }

    /* Contenedor de carruseles */
    .carousel-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 8px;
      flex: 1;
    }

    /* Separador de categoría */
    .cat-label {
      font-family: 'Anton', sans-serif;
      font-size: 0.76rem;
      letter-spacing: 3.5px;
      color: var(--yellow);
      text-transform: uppercase;
      margin: 4px 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 10px;
      border-left: 3px solid var(--yellow);
    }
    .cat-label:first-child { margin-top: 0; }
    .cat-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, #3a3a3a, transparent);
    }

    /* ── EXTRAS (grilla) ── */
    .extras-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 10px;
    }

    /* Carta de extra */
    .extra-card-btn {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 16px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0;
      transition: border-color 0.22s, box-shadow 0.22s, transform 0.12s;
      color: var(--menu-text);
      box-shadow: 0 4px 20px #00000028, 0 1px 0 #ffffff06 inset;
      text-align: center;
    }
    .extra-card-btn:hover {
      border-color: var(--yellow);
      box-shadow: 0 8px 32px rgba(245,163,0,0.18), 0 1px 0 #ffffff08 inset;
      transform: translateY(-3px);
    }
    .extra-card-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 12px rgba(245,163,0,0.12);
    }

    .extra-card-top {
      width: 100%;
      padding: 24px 12px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: linear-gradient(to bottom, #222, #1c1c1c);
    }

    .extra-card-icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(245, 163, 0, 0.1);
      border: 1.5px solid rgba(245, 163, 0, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.22s, border-color 0.22s, box-shadow 0.22s;
    }

    .extra-card-btn:hover .extra-card-icon-wrap {
      background: rgba(245, 163, 0, 0.16);
      border-color: rgba(245, 163, 0, 0.45);
      box-shadow: 0 0 18px rgba(245,163,0,0.2);
    }

    .extra-card-icon  { font-size: 2.4rem; line-height: 1; }

    .extra-card-bottom {
      width: 100%;
      padding: 12px 12px 16px;
      background: linear-gradient(to bottom, #1a1a1a, #161616);
      border-top: 1px solid rgba(245,163,0,0.1);
    }

    .extra-card-name  {
      font-family: 'Anton', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      color: var(--menu-text);
      display: block;
      margin-bottom: 4px;
    }

    .extra-card-btn:hover .extra-card-name { color: #fff; }

    .extra-card-price {
      font-family: 'Anton', sans-serif;
      font-size: 1.05rem;
      color: var(--yellow);
      display: block;
    }

    /* ════════════════════════════════
       TICKET (OSCURO) — más ancho
    ════════════════════════════════ */
    .ticket {
      width: 500px;
      flex-shrink: 0;
      background: var(--ticket-bg);
      border-left: 1px solid #252525;
      display: flex; flex-direction: column;
      color: var(--ticket-text);
    }

    .ticket-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--ticket-border);
      display: flex; justify-content: space-between; align-items: center;
      background: #181818;
    }
    .ticket-title {
      font-family: 'Anton', sans-serif;
      font-size: 0.9rem; letter-spacing: 2.5px; color: #ccc;
      text-transform: uppercase;
    }
    .btn-limpiar {
      background: none; border: 1px solid var(--red);
      color: var(--red); border-radius: 5px;
      padding: 6px 14px; font-size: 0.72rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      font-family: 'Anton', sans-serif; letter-spacing: 1px;
    }
    .btn-limpiar:hover { background: var(--red); color: #fff; }

    .ticket-items { flex: 1; overflow-y: auto; padding: 10px; }

    .ticket-empty {
      text-align: center; color: var(--ticket-muted);
      margin-top: 60px; font-size: 0.88rem;
    }
    .ticket-empty .icon { font-size: 3rem; display: block; margin-bottom: 10px; opacity: 0.3; }

    /* Fila de ítem */
    .ticket-item-wrap {
      border-radius: 8px; margin-bottom: 8px;
      border: 1px solid var(--ticket-border);
      overflow: hidden; background: var(--ticket-surf);
      transition: border-color 0.15s;
    }
    .ticket-item-wrap:focus-within { border-color: #3a3a3a; }
    .ticket-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px;
    }

    .qty-controls { display: flex; align-items: center; gap: 4px; }
    .qty-btn {
      width: 26px; height: 26px;
      background: var(--ticket-surf3);
      border: 1px solid var(--ticket-border); border-radius: 5px;
      color: var(--ticket-text); font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s; font-family: 'Lato', sans-serif;
    }
    .qty-btn:hover { background: var(--yellow); color: #111; }
    .qty-num { min-width: 22px; text-align: center; font-weight: 900; font-size: 0.95rem; }

    .item-info { flex: 1; min-width: 0; }
    .item-info .name {
      font-size: 0.82rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--ticket-text);
    }
    .item-info .variant-tag {
      font-size: 0.66rem; color: var(--ticket-muted);
      background: var(--ticket-surf3); padding: 2px 6px;
      border-radius: 4px; display: inline-block; margin-top: 2px;
      border: 1px solid var(--ticket-border);
    }
    .line-total {
      font-family: 'Anton', sans-serif; font-size: 0.95rem;
      color: var(--yellow); flex-shrink: 0; min-width: 70px; text-align: right;
    }

    /* Observación por ítem */
    .item-obs-wrap { border-top: 1px solid var(--ticket-border); padding: 0 10px 10px; }
    .item-obs {
      width: 100%; background: var(--ticket-surf2);
      border: 1px solid var(--ticket-border); border-radius: 5px;
      color: var(--ticket-text); padding: 6px 10px;
      font-size: 0.75rem; font-family: 'Lato', sans-serif;
      resize: none; height: 40px;
      transition: border-color 0.15s; margin-top: 8px;
    }
    .item-obs::placeholder { color: #4a4a4a; }
    .item-obs:focus { outline: none; border-color: #F5A30070; background: #2e2e2e; }

    /* ── FOOTER TICKET ── */
    .ticket-footer {
      border-top: 1px solid var(--ticket-border);
      padding: 16px 18px;
      background: #141414;
    }

    .total-row {
      display: flex; justify-content: space-between;
      font-size: 0.88rem; color: var(--ticket-muted); margin-bottom: 4px;
    }
    .total-row.grand {
      font-family: 'Anton', sans-serif; font-size: 1.35rem;
      color: #fff; border-top: 1px solid #2a2a2a;
      padding-top: 12px; margin-top: 8px; margin-bottom: 14px;
    }
    .total-row.grand span:last-child { color: var(--yellow); }

    /* Tipo de pedido */
    .tipo-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
    .tipo-btn {
      flex: 1; padding: 11px 8px;
      border: 1px solid var(--ticket-border);
      border-radius: 8px; background: var(--ticket-surf2);
      color: var(--ticket-muted);
      font-family: 'Anton', sans-serif;
      font-size: 0.82rem; letter-spacing: 1px;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tipo-btn:hover { border-color: #555; color: var(--ticket-text); }
    .tipo-btn.active-delivery { background: #201800; border-color: #c87d00; color: var(--yellow); }
    .tipo-btn.active-takeaway { background: #0e1c0e; border-color: var(--green); color: #4aba6a; }

    /* Aclaración general */
    .aclaracion-wrap { margin: 12px 0; }
    .aclaracion-wrap textarea {
      width: 100%; background: var(--ticket-surf2);
      border: 1px solid var(--ticket-border);
      border-radius: 6px; color: var(--ticket-text);
      padding: 9px 12px; font-size: 0.78rem;
      font-family: 'Lato', sans-serif;
      resize: none; height: 50px;
      transition: border-color 0.15s, background 0.15s;
    }
    .aclaracion-wrap textarea::placeholder { color: #4a4a4a; }
    .aclaracion-wrap textarea:focus { outline: none; border-color: #F5A30070; background: #2e2e2e; }

    /* Botón enviar */
    .btn-enviar {
      width: 100%; padding: 16px;
      background: var(--yellow); color: #111;
      border: none; border-radius: 8px;
      font-family: 'Anton', sans-serif;
      font-size: 1.1rem; letter-spacing: 2px;
      cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
    }
    .btn-enviar:hover  { background: var(--yellow2); box-shadow: 0 6px 24px #F5A30045; }
    .btn-enviar:active { transform: scale(0.98); }
    .btn-enviar:disabled { background: var(--ticket-surf3); color: #555; cursor: not-allowed; box-shadow: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green); color: #fff;
      padding: 11px 28px; border-radius: 8px;
      font-weight: 900; font-size: 0.9rem;
      box-shadow: 0 4px 24px #0004;
      transition: transform 0.3s; z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FLASH AL AGREGAR ── */
    @keyframes flashAdd {
      0%   { border-color: var(--yellow); box-shadow: 0 0 0 4px rgba(245,163,0,0.28), 0 12px 40px rgba(0,0,0,0.55); }
      100% { border-color: rgba(245,163,0,0.2);  box-shadow: 0 12px 40px rgba(0,0,0,0.55); }
    }
    @keyframes flashAddCard {
      0%   { border-color: var(--yellow); box-shadow: 0 0 0 3px #F5A30030; }
      100% { border-color: var(--card-border); box-shadow: 0 1px 4px #0000000a; }
    }
    .cv-section.added  { animation: flashAdd 0.55s ease forwards; }
    .bslide-card.added { animation: flashAddCard 0.5s ease forwards; }

    /* ═══════════════════════════════════════
       CARRUSEL HAMBURGUESAS
    ═══════════════════════════════════════ */

    .carousel-section {
      position: relative;
      margin-bottom: 4px;
      user-select: none;
      background: radial-gradient(ellipse at 38% 52%, rgba(245, 163, 0, 0.055) 0%, transparent 62%);
      border-radius: 16px;
      padding: 8px 0 6px;
    }

    /* ─── BURGER HERO LAYOUT ─── */
    .burger-hero-wrap {
      display: flex;
      align-items: stretch;
    }

    .carousel-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .size-panel {
      width: 136px;
      flex-shrink: 0;
      padding-left: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .size-panel > div {
      width: 100%;
    }

    .carousel-wrapper {
      position: relative;
      height: 400px;
      overflow: hidden;
    }

    .carousel-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .carousel-slide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 310px;
      margin-left: -155px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform, opacity;
    }

    .carousel-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px #00000030, 0 1px 0 #ffffff08 inset;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .carousel-slide.active .carousel-card {
      border-color: var(--yellow);
      box-shadow: 0 16px 64px #F5A3003a, 0 0 0 1px rgba(245,163,0,0.14), 0 2px 0 #ffffff0a inset;
    }

    .carousel-img-wrap {
      width: 100%;
      height: 218px;
      overflow: hidden;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s ease;
    }

    .carousel-slide.active .carousel-img {
      transform: scale(1.07);
    }

    .carousel-info {
      padding: 12px 14px 14px;
      background: linear-gradient(to bottom, #1c1c1c, #181818);
      border-top: 1px solid rgba(245,163,0,0.12);
    }

    .carousel-slide.active .carousel-info {
      background: linear-gradient(to bottom, #222, #1a1a1a);
    }

    .carousel-name {
      font-family: 'Anton', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.8px;
      color: var(--menu-text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .carousel-slide.active .carousel-name {
      color: #fff;
    }

    .carousel-desc {
      font-size: 0.67rem;
      color: var(--menu-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       CARRUSEL BEBIDAS
    ═══════════════════════════════════════ */

    .bcarousel-section {
      position: relative;
      margin-bottom: 4px;
      user-select: none;
      background: radial-gradient(ellipse at 50% 55%, rgba(245, 163, 0, 0.04) 0%, transparent 60%);
      border-radius: 14px;
      padding: 6px 0 4px;
    }

    .bcarousel-wrapper {
      position: relative;
      height: 390px;
      overflow: hidden;
    }

    .bcarousel-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .bslide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 265px;
      margin-left: -132px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform, opacity;
    }

    .bslide-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px #00000030, 0 1px 0 #ffffff06 inset;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .bslide.active .bslide-card {
      border-color: var(--yellow);
      box-shadow: 0 14px 52px #F5A3002e, 0 0 0 1px rgba(245,163,0,0.12), 0 2px 0 #ffffff09 inset;
    }

    .bslide-img-wrap {
      width: 100%;
      height: 210px;
      overflow: hidden;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bslide-img {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      padding: 10px 8px;
      transition: transform 0.5s ease;
    }

    .bslide.active .bslide-img {
      transform: scale(1.08);
    }

    .bslide-footer {
      padding: 14px 14px 16px;
      text-align: center;
      background: linear-gradient(to bottom, #1c1c1c, #181818);
      border-top: 1px solid rgba(245,163,0,0.1);
    }

    .bslide.active .bslide-footer {
      background: linear-gradient(to bottom, #222, #1a1a1a);
    }

    .bslide-name {
      font-family: 'Anton', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.5px;
      color: var(--menu-text);
      display: block;
      margin-bottom: 4px;
    }

    .bslide.active .bslide-name {
      color: #fff;
    }

    .bslide-price {
      font-family: 'Anton', sans-serif;
      font-size: 1.1rem;
      color: var(--yellow);
      display: block;
      margin: 0 0 12px;
    }

    .bslide-add {
      display: none;
      width: 100%;
      background: var(--yellow);
      color: #111;
      border: none;
      border-radius: 9px;
      padding: 11px 0;
      cursor: pointer;
      font-family: 'Anton', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 1.5px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    /* ─── BEBIDA HERO LAYOUT ─── */
    .bdrink-hero-wrap {
      display: flex;
      align-items: stretch;
    }

    .bcarousel-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .bside-panel {
      width: 136px;
      flex-shrink: 0;
      padding-left: 12px;
      display: flex;
      align-items: stretch;
    }

    .bside-panel > div {
      width: 100%;
    }

    /* ─── PANEL LATERAL DE EXTRAS ─── */
    .extras-side-panel {
      background: rgba(12, 12, 12, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(245, 163, 0, 0.2);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 12px 40px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.04) inset;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .esp-header {
      padding: 12px 10px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      text-align: center;
      flex-shrink: 0;
    }

    .esp-title {
      font-size: 0.57rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--yellow);
      background: rgba(245, 163, 0, 0.1);
      border: 1px solid rgba(245, 163, 0, 0.28);
      padding: 3px 8px;
      border-radius: 5px;
      white-space: nowrap;
      display: inline-block;
    }

    .esp-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 8px;
      flex: 1;
      justify-content: center;
    }

    .esp-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 18px 6px 16px;
      cursor: pointer;
      text-align: center;
      transition: background 0.18s, border-color 0.18s, transform 0.1s, box-shadow 0.18s;

    /* Panel acción bebida activa */

    .bdp-add-btn:hover {

    }

    .bdp-add-btn:active {
      background: var(--yellow);
      transform: scale(0.95);
      box-shadow: none;
    }

    /* ── NAVS + DOTS ── */
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 38px;

    .carousel-dots, .bcarousel-dots {

    /* ── PANEL DE TAMAÑOS (lateral derecho) ── */

    .cv-section {

<body>

<header>
  <div class="logo">
    <span class="logo-icon">🍔</span>
    <div>
      <div class="logo-text">CLICKS BURGER</div>
      <div class="logo-sub">Hacé tu Pedido</div>
    </div>
  </div>
  <div class="pedido-badge" id="num-pedido">PEDIDO #001</div>
</header>

<div class="main">
  <div class="menu" id="menu"></div>

  <div class="ticket">
    <div class="ticket-header">
      <span class="ticket-title">PEDIDO ACTUAL</span>
      <button class="btn-limpiar" onclick="limpiarTicket()">LIMPIAR</button>
    </div>
    <div class="ticket-items" id="ticket-items">
      <div class="ticket-empty">
        <span class="icon">🧾</span>
        Agregá ítems del menú
      </div>
    </div>
    <div class="ticket-footer">
      <div id="totals"></div>

      <div class="tipo-wrap">
        <button class="tipo-btn active-delivery" id="btn-delivery" onclick="setTipo('delivery')">🏍 Delivery</button>
        <button class="tipo-btn" id="btn-takeaway" onclick="setTipo('takeaway')">🥡 Takeaway</button>
      </div>

      <div class="aclaracion-wrap">
        <textarea id="aclaracion" placeholder="Aclaración general del pedido..."></textarea>
      </div>
      <button class="btn-enviar" id="btn-enviar" onclick="enviarPedido()" disabled>
        ENVIAR PEDIDO
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CATÁLOGO (con defaults hardcodeados como fallback) ──
const CATALOGO_DEFAULT = {
  burgers: [
    {
      id: 'american',
      img: 'img/american-clicks.jpg',
      nombre: 'AMERICAN CLICKS',
      desc: 'Carne, doble queso, bacon, lechuga, tomate, cebolla y aderezo clicks',
      variantes: [
        { key: 'simple', label: 'Simple', precio: 11500 },
        { key: 'doble',  label: 'Doble',  precio: 14500 },
        { key: 'triple', label: 'Triple', precio: 17500 },
      ]
    },
    {
      id: 'cheeseburger',
      img: 'img/cheeseburger.jpg',
      nombre: 'CHEESEBURGER',
      desc: 'Carne, doble queso, doble bacon y mayonesa',
      variantes: [
        { key: 'simple', label: 'Simple', precio: 11000 },
        { key: 'doble',  label: 'Doble',  precio: 14000 },
        { key: 'triple', label: 'Triple', precio: 17000 },
      ]
    },
    {
      id: 'cuarto',
      img: 'img/cuarto-clicks.jpg',
      nombre: 'CUARTO CLICKS',
      desc: 'Carne, doble queso, bacon, ketchup, mostaza y cebolla brunoise',
      variantes: [
        { key: 'simple', label: 'Simple', precio: 11000 },
        { key: 'doble',  label: 'Doble',  precio: 14000 },
        { key: 'triple', label: 'Triple', precio: 17000 },
      ]
    },
  ],
  bebidas: [
    { id: 'coca',     img: 'img/latacoca.jpg',     nombre: 'Coca-Cola', precio: 2500 },
    { id: 'sprite',   img: 'img/latasprite.jpg',   nombre: 'Sprite',    precio: 2500 },
    { id: 'fanta',    img: 'img/latafanta.jpg',    nombre: 'Fanta',     precio: 2500 },
    { id: 'cocazero', img: 'img/latacocazero.jpg', nombre: 'Coca Zero', precio: 2500 },
  ],
  extras: [
    { id: 'papas', icon: '🍟', nombre: 'Porción de Papas', precio: 2500 },
    { id: 'mayo',  icon: '🥣', nombre: 'Mayonesa',         precio: 500  },
  ]
};

function cargarCatalogo() {
  const guardado = localStorage.getItem('cb_catalog');
  return guardado ? JSON.parse(guardado) : JSON.parse(JSON.stringify(CATALOGO_DEFAULT));
}

let catalogo = cargarCatalogo();
let BURGERS  = catalogo.burgers;
let BEBIDAS  = catalogo.bebidas;
let EXTRAS   = catalogo.extras;

// ── MAPA DE ITEMS ──
let ITEM_MAP = {};

function construirItemMap() {
  ITEM_MAP = {};
  BURGERS.forEach(b => b.variantes.forEach(v => {
    ITEM_MAP[`${b.id}_${v.key}`] = {
      nombre: b.nombre, variante: v.label,
      precio: v.precio, icon: '🍔', esBurger: true,
    };
  }));
  BEBIDAS.forEach(b => {
    ITEM_MAP[b.id] = { nombre: b.nombre, variante: null, precio: b.precio, icon: '🥤', esBurger: false };
  });
  EXTRAS.forEach(e => {
    ITEM_MAP[e.id] = { nombre: e.nombre, variante: null, precio: e.precio, icon: e.icon, esBurger: false };
  });
}

construirItemMap();

// ── ESTADO ──
let pedido     = {};
let tipoPedido = 'delivery';
let numPedido  = Number(localStorage.getItem('cb_ultimo_pedido') || 0) + 1;
const channel  = new BroadcastChannel('clicks_burger');

// Estado de carruseles
let activeBurger = 0;
let activeBebida = 0;
let burgerTouchInitialized = false;
let bebidaTouchInitialized = false;

function setTipo(tipo) {
  tipoPedido = tipo;
  document.getElementById('btn-delivery').className =
    'tipo-btn' + (tipo === 'delivery' ? ' active-delivery' : '');
  document.getElementById('btn-takeaway').className =
    'tipo-btn' + (tipo === 'takeaway' ? ' active-takeaway' : '');
}

// ═══════════════════════════════════════
// CARRUSEL HAMBURGUESAS
// ═══════════════════════════════════════

function getOffset(i, total) {
  let o = (i - activeBurger + total) % total;
  if (o > Math.floor(total / 2)) o -= total;
  return o;
}

function renderCarruselBurgers() {
  const inner = document.getElementById('carousel-inner');
  const dots  = document.getElementById('carousel-dots');
  if (!inner) return;

  inner.innerHTML = BURGERS.map((b, i) => `
    <div class="carousel-slide" id="cslide-${i}" onclick="irABurger(${i})">
      <div class="carousel-card">
        <div class="carousel-img-wrap">
          <img class="carousel-img" src="${b.img}" alt="${b.nombre}" onerror="this.style.display='none'">
        </div>
        <div class="carousel-info">
          <div class="carousel-name">${b.nombre}</div>
          <div class="carousel-desc">${b.desc}</div>
        </div>
      </div>
    </div>
  `).join('');

  dots.innerHTML = BURGERS.map((_, i) =>
    `<span class="c-dot ${i === activeBurger ? 'active' : ''}" onclick="irABurger(${i})"></span>`
  ).join('');

  // Swipe touch - solo agregar una vez
  if (!burgerTouchInitialized) {
    const wrapper = inner.closest('.carousel-wrapper');
    let touchStartX = 0;
    wrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    wrapper.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) dx < 0 ? nextBurger() : prevBurger();
    }, { passive: true });
    burgerTouchInitialized = true;
  }

  posicionarSlidesBurgers();
  renderVariantes();
}

function posicionarSlidesBurgers() {
  const total = BURGERS.length;

  BURGERS.forEach((_, i) => {
    const slide = document.getElementById(`cslide-${i}`);
    if (!slide) return;

    const offset = getOffset(i, total);
    const abs = Math.abs(offset);

    // Configuración hero: activo protagonista, laterales con profundidad marcada
    const cfg = [
      { x:    0, scale: 1.0,  opacity: 1.0,  z: 5, rot:  0 },
      { x:  318, scale: 0.63, opacity: 0.35, z: 3, rot: 14 },
      { x:  540, scale: 0.40, opacity: 0.08, z: 1, rot: 22 },
    ];

    if (abs >= cfg.length) {
      slide.style.opacity = '0';
      slide.style.zIndex  = '0';
      slide.style.pointerEvents = 'none';
      return;
    }

    const c = cfg[abs];
    const xPx = offset >= 0 ? c.x : -c.x;
    const rotDir = offset > 0 ? -1 : 1;

    slide.style.transform = abs === 0
      ? `translateY(-50%) translateX(${xPx}px) scale(${c.scale})`
      : `translateY(-50%) translateX(${xPx}px) scale(${c.scale}) perspective(700px) rotateY(${rotDir * c.rot}deg)`;

    slide.style.opacity = String(c.opacity);
    slide.style.zIndex  = String(c.z);
    slide.style.pointerEvents = 'auto';
    slide.classList.toggle('active', offset === 0);
  });

  document.querySelectorAll('.c-dot').forEach((d, i) => {
    d.classList.toggle('active', i === activeBurger);
  });
}

function renderVariantes() {
  const b = BURGERS[activeBurger];
  const el = document.getElementById('carousel-variants');
  if (!el) return;

  // Verificar si ya está renderizado este burger
  const existingSection = document.getElementById(`bc-${b.id}`);
  if (existingSection) {
    // Solo actualizar el nombre si es diferente
    const nameEl = existingSection.querySelector('.cv-active-name');
    if (nameEl && nameEl.textContent !== b.nombre) {
      nameEl.textContent = b.nombre;
    }
    return;
  }

  // Crear nueva sección sin hacer fade brusco
  const html = `
    <div class="cv-section" id="bc-${b.id}">
      <div class="cv-header">
        <span class="cv-active-name">${b.nombre}</span>
        <span class="cv-elegir">ELEGÍ TU TAMAÑO</span>
      </div>
      <div class="cv-grid">
        ${b.variantes.map(v => `
          <button class="cv-btn" onclick="agregarItem('${b.id}_${v.key}', '${b.id}')">
            <span class="cv-btn-label">${v.label}</span>
            <span class="cv-btn-price">$${v.precio.toLocaleString('es-AR')}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  el.innerHTML = html;
}

function irABurger(i) {
  if (i === activeBurger) return;
  activeBurger = i;
  posicionarSlidesBurgers();
  renderVariantes();
}

function prevBurger() {
  activeBurger = (activeBurger - 1 + BURGERS.length) % BURGERS.length;
  posicionarSlidesBurgers();
  renderVariantes();
}

function nextBurger() {
  activeBurger = (activeBurger + 1) % BURGERS.length;
  posicionarSlidesBurgers();
  renderVariantes();
}

// ═══════════════════════════════════════
// CARRUSEL BEBIDAS
// ═══════════════════════════════════════

function getOffsetBebida(i) {
  const total = BEBIDAS.length;
  let o = (i - activeBebida + total) % total;
  if (o > Math.floor(total / 2)) o -= total;
  return o;
}

function renderCarruselBebidas() {
  const inner = document.getElementById('bcarousel-inner');
  const dots  = document.getElementById('bcarousel-dots');
  if (!inner) return;

  inner.innerHTML = BEBIDAS.map((b, i) => `
    <div class="bslide" id="bslide-${i}" onclick="irABebida(${i})">
      <div class="bslide-card">
        <div class="bslide-img-wrap">
          <img class="bslide-img" src="${b.img}" alt="${b.nombre}" onerror="this.style.display='none'">
        </div>
        <div class="bslide-footer">
          <span class="bslide-name">${b.nombre}</span>
          <span class="bslide-price">$${b.precio.toLocaleString('es-AR')}</span>
          <button class="bslide-add" onclick="event.stopPropagation(); agregarItem('${b.id}', null)">AGREGAR</button>
        </div>
      </div>
    </div>
  `).join('');

  dots.innerHTML = BEBIDAS.map((_, i) =>
    `<span class="c-dot ${i === activeBebida ? 'active' : ''}" onclick="irABebida(${i})"></span>`
  ).join('');

  // Swipe touch - solo agregar una vez
  if (!bebidaTouchInitialized) {
    const wrapper = inner.closest('.bcarousel-wrapper');
    let touchStartX = 0;
    wrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    wrapper.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 30) dx < 0 ? nextBebida() : prevBebida();
    }, { passive: true });
    bebidaTouchInitialized = true;
  }

  posicionarSlidesBebidas();
  renderBebidaPanel();
}

function renderBebidaPanel() {
  const b  = BEBIDAS[activeBebida];
  const el = document.getElementById('bdrink-panel');
  if (!el || !b) return;

  el.innerHTML = `
    <div class="bdp-section" id="bdp-active">
      <div class="bdp-header">
        <span class="bdp-name">${b.nombre}</span>
        <span class="bdp-label">AGREGAR</span>
        <span class="bdp-price">$${b.precio.toLocaleString('es-AR')}</span>
      </div>
      <div class="bdp-body">
        <button class="bdp-add-btn" onclick="agregarBebidaActiva()">+ AGREGAR</button>
      </div>
    </div>
  `;
}

function agregarBebidaActiva() {
  const b   = BEBIDAS[activeBebida];
  const el  = document.getElementById('bdp-active');
  agregarItem(b.id, null);
  if (el) {
    el.classList.remove('added');
    void el.offsetWidth;
    el.classList.add('added');
  }
}

function posicionarSlidesBebidas() {
  const total = BEBIDAS.length;

  BEBIDAS.forEach((_, i) => {
    const slide = document.getElementById(`bslide-${i}`);
    if (!slide) return;

    const offset = getOffsetBebida(i, total);
    const abs = Math.abs(offset);

    // Configuración profundidad bebidas — proporcional a cards 265px
    const cfg = [
      { x:    0, scale: 1.0,  opacity: 1.0,  z: 5 },
      { x:  292, scale: 0.63, opacity: 0.34, z: 3 },
      { x:  495, scale: 0.40, opacity: 0.08, z: 1 },
    ];

    if (abs >= cfg.length) {
      slide.style.opacity = '0';
      slide.style.zIndex  = '0';
      slide.style.pointerEvents = 'none';
      return;
    }

    const c = cfg[abs];
    const xPx = offset >= 0 ? c.x : -c.x;

    slide.style.transform = `translateY(-50%) translateX(${xPx}px) scale(${c.scale})`;
    slide.style.opacity = String(c.opacity);
    slide.style.zIndex  = String(c.z);
    slide.style.pointerEvents = 'auto';
    slide.classList.toggle('active', offset === 0);
  });

  document.querySelectorAll('#bcarousel-dots .c-dot').forEach((d, i) => {
    d.classList.toggle('active', i === activeBebida);
  });
}

function irABebida(i) {
  if (i === activeBebida) return;
  activeBebida = i;
  posicionarSlidesBebidas();
}

function prevBebida() {
  activeBebida = (activeBebida - 1 + BEBIDAS.length) % BEBIDAS.length;
  posicionarSlidesBebidas();
}

function nextBebida() {
  activeBebida = (activeBebida + 1) % BEBIDAS.length;
  posicionarSlidesBebidas();
}

// ── RENDER MENÚ ──

  const el = document.getElementById('menu');

  const extrasPanelHTML = `
    <div class="extras-side-panel">
      <div class="esp-header">
        <span class="esp-title">EXTRAS</span>
      </div>
      <div class="esp-grid">
        ${EXTRAS.map(e => `
          <button class="esp-btn" onclick="agregarItem('${e.id}', null)">
            <span class="esp-icon">${e.icon}</span>
            <span class="esp-name">${e.nombre}</span>
            <span class="esp-price">$${e.precio.toLocaleString('es-AR')}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  el.innerHTML = `
    <div class="carousel-container">
      <div class="cat-label">Hamburguesas</div>
      <div class="carousel-section">
        <div class="burger-hero-wrap">
          <div class="carousel-area">
            <div class="carousel-wrapper">
              <div class="carousel-inner" id="carousel-inner"></div>
              <button class="carousel-nav prev" onclick="prevBurger()">&#8249;</button>
              <button class="carousel-nav next" onclick="nextBurger()">&#8250;</button>
            </div>
            <div class="carousel-dots" id="carousel-dots"></div>
          </div>
          <div class="size-panel">
            <div id="carousel-variants"></div>
          </div>
        </div>
      </div>

      <div class="cat-label">Bebidas</div>
      <div class="bcarousel-section">
        <div class="bdrink-hero-wrap">
          <div class="bcarousel-area">
            <div class="bcarousel-wrapper">
              <div class="bcarousel-inner" id="bcarousel-inner"></div>
              <button class="carousel-nav prev" onclick="prevBebida()">&#8249;</button>
              <button class="carousel-nav next" onclick="nextBebida()">&#8250;</button>
            </div>
            <div class="bcarousel-dots" id="bcarousel-dots"></div>
          </div>
          <div class="bside-panel">
            ${extrasPanelHTML}
          </div>
        </div>
      </div>

  `;

  renderCarruselBurgers();
  renderCarruselBebidas();

// ── TICKET ──
function agregarItem(id, burgerCardId) {
  if (!pedido[id]) pedido[id] = { qty: 0, obs: '' };
  pedido[id].qty++;

  if (burgerCardId) {
    const card = document.getElementById(`bc-${burgerCardId}`);
    if (card) {
      card.classList.remove('added');
      void card.offsetWidth; // forzar reflow
      card.classList.add('added');
    }
  }

  // Flash en bebida seleccionada
  const bIndex = BEBIDAS.findIndex(b => b.id === id);
  if (bIndex !== -1) {
    const bslide = document.getElementById(`bslide-${bIndex}`);
    if (bslide) {
      const card = bslide.querySelector('.bslide-card');
      card.classList.remove('added');
      void card.offsetWidth;
      card.classList.add('added');
    }
  }

  renderTicket();
}

function cambiarCantidad(id, delta) {
  if (!pedido[id]) return;
  pedido[id].qty += delta;
  if (pedido[id].qty <= 0) delete pedido[id];
  renderTicket();
}

function setObs(id, val) {
  if (pedido[id]) pedido[id].obs = val;
}

function limpiarTicket() {
  pedido = {};
  renderTicket();
}

function renderTicket() {
  const container = document.getElementById('ticket-items');
  const totalsEl  = document.getElementById('totals');
  const btnEnviar = document.getElementById('btn-enviar');
  const ids = Object.keys(pedido);

  if (ids.length === 0) {
    container.innerHTML = `<div class="ticket-empty"><span class="icon">🧾</span>Agregá ítems del menú</div>`;
    totalsEl.innerHTML = '';
    btnEnviar.disabled = true;
    return;
  }

  let subtotal = 0;
  container.innerHTML = ids.map(id => {
    const it   = ITEM_MAP[id];
    const item = pedido[id];
    const line = it.precio * item.qty;
    subtotal  += line;
    return `
      <div class="ticket-item-wrap">
        <div class="ticket-row">
          <div class="qty-controls">
            <button class="qty-btn" onclick="cambiarCantidad('${id}',-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="cambiarCantidad('${id}',1)">+</button>
          </div>
          <div class="item-info">
            <div class="name">${it.icon} ${it.nombre}</div>
            ${it.variante ? `<span class="variant-tag">${it.variante}</span>` : ''}
          </div>
          <div class="line-total">$${line.toLocaleString('es-AR')}</div>
        </div>
        ${it.esBurger ? `
        <div class="item-obs-wrap">
          <textarea class="item-obs"
            placeholder="Obs: sin cebolla, bien cocida..."
            onchange="setObs('${id}', this.value)"
          >${item.obs}</textarea>
        </div>` : ''}
      </div>
    `;
  }).join('');

  const cantItems = ids.reduce((s, id) => s + pedido[id].qty, 0);
  totalsEl.innerHTML = `
    <div class="total-row"><span>Ítems (${cantItems})</span><span>$${subtotal.toLocaleString('es-AR')}</span></div>
    <div class="total-row grand"><span>TOTAL</span><span>$${subtotal.toLocaleString('es-AR')}</span></div>
  `;
  btnEnviar.disabled = false;
}

// ── WHATSAPP ──
function construirUrlWhatsApp(data) {
  const WA_NUMBER = localStorage.getItem('cb_wsp_phone') || '5493518142654';

  const tipo = data.tipo === 'delivery' ? '🏍 Delivery' : '🥡 Takeaway';

  let lineas = [];
  lineas.push(`🍔 *NUEVO PEDIDO #${String(data.num).padStart(3,'0')}*`);
  lineas.push(`🕐 Hora: ${data.hora}`);
  lineas.push(`📦 Tipo: ${tipo}`);
  lineas.push('');
  lineas.push('*Detalle:*');

  let total = 0;
  data.items.forEach(it => {
    let linea = `• ${it.cantidad}x ${it.nombre}`;
    if (it.variante) linea += ` (${it.variante})`;
    lineas.push(linea);
    if (it.obs) lineas.push(`  ↳ _${it.obs}_`);
    total += it.precio * it.cantidad;
  });

  if (data.aclaracion) {
    lineas.push('');
    lineas.push(`⚠ *Aclaración:* ${data.aclaracion}`);
  }

  lineas.push('');
  lineas.push(`💰 *Total: $${total.toLocaleString('es-AR')}*`);

  const mensaje = lineas.join('\n');
  return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(mensaje)}`;
}

// ── ENVIAR ──
function enviarPedido() {
  const ids = Object.keys(pedido);
  if (!ids.length) return;

  const aclaracion = document.getElementById('aclaracion').value.trim();
  const data = {
    num:    numPedido,
    hora:   new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
    tipo:   tipoPedido,
    items:  ids.map(id => ({
      ...ITEM_MAP[id],
      key:      id,
      cantidad: pedido[id].qty,
      obs:      pedido[id].obs || '',
    })),
    aclaracion,
    estado: 'nuevo',
  };

  const cola = JSON.parse(localStorage.getItem('cb_cola') || '[]');
  cola.push(data);
  localStorage.setItem('cb_cola', JSON.stringify(cola));
  channel.postMessage({ tipo: 'nuevo_pedido', pedido: data });

  mostrarToast(`✓ Pedido #${String(numPedido).padStart(3,'0')} enviado. ¡Esperá la confirmación!`);
  window.open(construirUrlWhatsApp(data), '_blank');

  numPedido++;
  localStorage.setItem('cb_ultimo_pedido', numPedido - 1);
  document.getElementById('num-pedido').textContent = `PEDIDO #${String(numPedido).padStart(3,'0')}`;
  pedido = {};
  document.getElementById('aclaracion').value = '';
  renderTicket();
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── ESCUCHAR ACTUALIZACIONES DEL ADMIN ──
channel.onmessage = ({ data }) => {
  if (data.tipo === 'catalog_updated') {
    catalogo = cargarCatalogo();
    BURGERS  = catalogo.burgers;
    BEBIDAS  = catalogo.bebidas;
    EXTRAS   = catalogo.extras;
    construirItemMap();
    activeBurger = 0;
    activeBebida = 0;
    burgerTouchInitialized = false;
    bebidaTouchInitialized = false;
    pedido = {};
    renderMenu();
    renderTicket();
  }
};

// ── INIT ──
renderMenu();
renderTicket();
document.getElementById('num-pedido').textContent = `PEDIDO #${String(numPedido).padStart(3,'0')}`;
</script>
